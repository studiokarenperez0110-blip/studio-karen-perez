<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Studio Karen Perez</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.15);--gold-dim2:rgba(201,168,76,0.08);
  --bg:#0a0a0a;--bg1:#111;--bg2:#171717;--bg3:#1e1e1e;
  --tx:#f0ede8;--tx2:#8a8680;--tx3:#4a4845;
  --bd:#252525;--gr:#4CAF7D;--rd:#E05C5C;--pu:#8B5CF6;
  --r:14px;--font-serif:'Cormorant Garamond',serif;--font-sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font-sans);font-size:15px;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;}
#app-wrap{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--bg);}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;}
#nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0e0e0e;border-top:0.5px solid var(--bd);padding:10px 8px 20px;display:flex;justify-content:space-around;align-items:center;z-index:100;}
.nav-btn{background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;opacity:.45;transition:opacity .2s;}
.nav-btn.active{opacity:1;}
.nav-btn span{font-size:10px;font-family:var(--font-sans);color:var(--tx);}
.nav-fab{width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:-14px;flex-shrink:0;}
/* Cards */
.card{background:var(--bg1);border:0.5px solid var(--bd);border-radius:var(--r);padding:16px;}
.gold-btn{background:var(--gold);color:#0a0a0a;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:500;width:100%;cursor:pointer;font-family:var(--font-sans);letter-spacing:.3px;}
.gold-btn:disabled{background:var(--bg3);color:var(--tx3);cursor:default;}
.outline-btn{background:transparent;color:var(--gold);border:0.5px solid rgba(201,168,76,.3);border-radius:12px;padding:13px;font-size:14px;font-weight:400;width:100%;cursor:pointer;font-family:var(--font-sans);}
.inp{background:var(--bg2);border:0.5px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:14px;width:100%;outline:none;font-family:var(--font-sans);}
.inp:focus{border-color:var(--gold);}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;}
.fade-in{animation:fi .2s ease-out;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Loader */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spin{width:36px;height:36px;border:2px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:0.5px solid var(--gold);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--tx);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
/* Status colors */
.s-pendiente{background:rgba(250,199,117,.12);color:#FAC775;}
.s-confirmada{background:rgba(76,175,125,.12);color:#4CAF7D;}
.s-completada{background:rgba(138,134,128,.12);color:#8a8680;}
.s-cancelada{background:rgba(224,92,92,.12);color:#E05C5C;}
</style>
</head>
<body>
<div id="loader">
  <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);letter-spacing:2px;">STUDIO</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--tx2);letter-spacing:4px;">KAREN PEREZ</div>
  <div class="spin" style="margin-top:12px;"></div>
</div>
<div id="toast"></div>
<div id="app-wrap">
  <div id="screen"></div>
  <nav id="nav-bar">
    <button class="nav-btn active" id="nb-home" onclick="go('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1H15v-5H9v5H4a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" id="nb-services" onclick="go('services')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span>Servicios</span>
    </button>
    <button class="nav-fab" onclick="go('book')">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>
    <button class="nav-btn" id="nb-appointments" onclick="go('appointments')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Citas</span>
    </button>
    <button class="nav-btn" id="nb-profile" onclick="go('profile')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Perfil</span>
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── CONFIG ──
const SUPA_URL = 'https://tdmbiymxkgqobtecyfak.supabase.co';
const SUPA_KEY = 'sb_publishable_eKLS3hxmcffHvoa5fTy1jw_cQxH-KUf';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── STATE ──
let S = {
  screen: 'home',
  svcs: [],
  appts: [],
  user: JSON.parse(localStorage.getItem('kp_user') || 'null'),
  bk: { step: 1, svcId: null, date: null, time: null, pay: null },
  adminView: 'agenda',
  adminAuth: false,
  loading: false
};

const fmt = n => new Intl.NumberFormat('es-CO').format(n) + ' COP';
const dur = m => m < 60 ? m + 'min' : `${Math.floor(m/60)}h${m%60?' '+m%60+'min':''}`;
const getSvc = id => S.svcs.find(s => s.id == id);
const fmtDate = ds => {
  const d = new Date(ds + 'T12:00:00');
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const mos = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${days[d.getDay()]} ${d.getDate()} ${mos[d.getMonth()]}`;
};
const stLabel = s => ({pendiente:'Pendiente',confirmada:'Confirmada',completada:'Completada',cancelada:'Cancelada'}[s]||s);

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('nb-' + id);
  if (el) el.classList.add('active');
}

// ── DATA ──
async function loadSvcs() {
  const { data, error } = await sb.from('servicios').select('*').order('id');
  if (!error && data) S.svcs = data;
}

async function loadAppts() {
  if (!S.user) return;
  const { data, error } = await sb.from('citas').select('*').order('fecha').order('hora');
  if (!error && data) S.appts = data;
}

async function loadAllAppts() {
  const { data, error } = await sb.from('citas').select('*').order('fecha').order('hora');
  if (!error && data) S.appts = data;
}

async function saveUser(nombre, telefono) {
  const { data, error } = await sb.from('usuarios').insert([{ nombre, telefono }]).select().single();
  if (error) { toast('Error guardando usuario'); return null; }
  return data;
}

async function createAppt(apptData) {
  const { data, error } = await sb.from('citas').insert([apptData]).select().single();
  if (error) { toast('Error creando cita: ' + error.message); return null; }
  return data;
}

async function updateAppt(id, updates) {
  const { error } = await sb.from('citas').update(updates).eq('id', id);
  if (error) { toast('Error actualizando cita'); return false; }
  return true;
}

async function updateSvc(id, updates) {
  const { error } = await sb.from('servicios').update(updates).eq('id', id);
  if (error) { toast('Error actualizando servicio'); return false; }
  return true;
}

// ── AVAILABILITY ──
function getSlots(date, svcId) {
  const svc = getSvc(svcId); if (!svc) return [];
  const booked = S.appts
    .filter(a => a.fecha === date && a.estado !== 'cancelada')
    .map(a => ({ t: a.hora.substring(0,5), d: getSvc(a.servicio_id)?.duracion || 60 }));
  const slots = [];
  for (let h = 8; h < 18; h++) {
    for (let m = 0; m < 60; m += 30) {
      const ts = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const sm = h*60+m, em = sm + svc.duracion;
      if (em > 18*60) continue;
      const ok = !booked.some(b => {
        const [bh,bm] = b.t.split(':').map(Number);
        const bs = bh*60+bm;
        return sm < bs+b.d && em > bs;
      });
      if (ok) slots.push(ts);
    }
  }
  return slots;
}

function getDays(n) {
  const out = []; const base = new Date();
  for (let i = 1; i <= n+10 && out.length < n; i++) {
    const d = new Date(base); d.setDate(d.getDate()+i);
    if (d.getDay() !== 0) out.push(d.toISOString().split('T')[0]);
  }
  return out;
}

// ── SCREENS ──
function renderHome() {
  const upcoming = S.appts.filter(a => a.estado !== 'cancelada' && a.estado !== 'completada').slice(0,2);
  return `<div class="fade-in" style="padding:20px 16px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
    <div>
      <p style="font-family:var(--font-serif);font-size:24px;color:var(--gold);letter-spacing:1px;">Studio Karen Perez</p>
      <p style="color:var(--tx2);font-size:12px;margin-top:2px;">Barrio Luis Useche Díaz · Lun–Sáb 8am–6pm</p>
    </div>
    <div onclick="go('profile')" style="width:40px;height:40px;border-radius:50%;background:var(--gold-dim);border:0.5px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="var(--gold)"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div style="background:var(--gold-dim2);border:0.5px solid rgba(201,168,76,.2);border-radius:18px;padding:20px;margin-bottom:22px;">
    <p style="font-family:var(--font-serif);font-size:19px;color:var(--tx);margin-bottom:4px;">Tu cabello, nuestra pasión</p>
    <p style="color:var(--tx2);font-size:13px;margin-bottom:16px;">Especialistas en alisados, keratinas y más</p>
    <button class="gold-btn" onclick="go('book')">Reservar cita →</button>
  </div>

  <p style="font-family:var(--font-serif);font-size:18px;margin-bottom:14px;">Servicios</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;">
  ${S.svcs.map(s => `
  <div onclick="startBook(${s.id})" style="background:var(--bg1);border:0.5px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;">
    ${s.foto_url ? `<img src="${s.foto_url}" style="width:100%;height:70px;object-fit:cover;border-radius:8px;margin-bottom:10px;" onerror="this.style.display='none'"/>` : `<div style="width:32px;height:32px;background:var(--gold-dim);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;"><svg width="15" height="15" viewBox="0 0 16 16"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5l3.5-.5z" fill="var(--gold)"/></svg></div>`}
    <p style="font-size:13px;font-weight:500;margin-bottom:3px;">${s.nombre}</p>
    <p style="color:var(--gold);font-size:12px;">${fmt(s.precio)}</p>
  </div>`).join('')}
  </div>

  ${upcoming.length > 0 ? `
  <p style="font-family:var(--font-serif);font-size:18px;margin-bottom:14px;">Próximas citas</p>
  ${upcoming.map(a => {
    const sv = getSvc(a.servicio_id);
    return `<div class="card" style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <p style="font-size:13px;font-weight:500;">${sv?.nombre || 'Servicio'}</p>
        <p style="color:var(--tx2);font-size:12px;margin-top:2px;">${fmtDate(a.fecha)} · ${a.hora?.substring(0,5)}</p>
      </div>
      <span class="badge s-${a.estado}">${stLabel(a.estado)}</span>
    </div>`;
  }).join('')}` : ''}
  </div>`;
}

function renderServices() {
  return `<div class="fade-in" style="padding:20px 16px;">
  <p style="font-family:var(--font-serif);font-size:24px;margin-bottom:4px;">Servicios</p>
  <p style="color:var(--tx2);font-size:13px;margin-bottom:20px;">Todos los tratamientos disponibles</p>
  ${S.svcs.map(s => `
  <div class="card" style="margin-bottom:12px;">
    ${s.foto_url ? `<img src="${s.foto_url}" style="width:100%;height:140px;object-fit:cover;border-radius:10px;margin-bottom:14px;" onerror="this.style.display='none'"/>` : ''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <p style="font-size:15px;font-weight:500;">${s.nombre}</p>
      <p style="color:var(--gold);font-size:14px;font-weight:500;white-space:nowrap;">${fmt(s.precio)}</p>
    </div>
    <p style="color:var(--tx2);font-size:13px;margin-bottom:12px;">${s.descripcion || ''}</p>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="color:var(--tx2);font-size:12px;">⏱ ${dur(s.duracion)}</span>
      <button onclick="startBook(${s.id})" style="background:var(--gold);color:#0a0a0a;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;">Reservar</button>
    </div>
  </div>`).join('')}
  </div>`;
}

function renderBook() {
  const { step, svcId, date, time, pay } = S.bk;
  const pct = Math.round((step/3)*100);
  const svc = getSvc(svcId);
  return `<div class="fade-in" style="padding:20px 16px;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    ${step > 1 ? `<button onclick="prevStep()" style="background:var(--bg2);border:0.5px solid var(--bd);border-radius:8px;width:32px;height:32px;color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">‹</button>` : ''}
    <div style="flex:1;">
      <p style="font-family:var(--font-serif);font-size:20px;">Reservar cita</p>
      <p style="color:var(--tx2);font-size:12px;">Paso ${step} de 3 · ${['Servicio','Fecha y hora','Confirmar'][step-1]}</p>
    </div>
  </div>
  <div style="background:var(--bg3);border-radius:4px;height:3px;margin-bottom:22px;overflow:hidden;">
    <div style="background:var(--gold);height:100%;width:${pct}%;border-radius:4px;transition:width .3s;"></div>
  </div>
  ${step===1 ? bookStep1() : step===2 ? bookStep2() : bookStep3()}
  </div>`;
}

function bookStep1() {
  const sel = S.bk.svcId;
  return S.svcs.map(s => {
    const on = sel == s.id;
    return `<div onclick="S.bk.svcId=${s.id};render()" style="background:${on?'var(--gold-dim2)':'var(--bg1)'};border:${on?'1px solid var(--gold)':'0.5px solid var(--bd)'};border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;background:${on?'var(--gold-dim)':'var(--bg2)'};border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <svg width="15" height="15" viewBox="0 0 16 16"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5l3.5-.5z" fill="var(--gold)"/></svg>
        </div>
        <div>
          <p style="font-size:14px;font-weight:500;">${s.nombre}</p>
          <p style="color:var(--tx2);font-size:12px;">${dur(s.duracion)}</p>
        </div>
      </div>
      <div style="text-align:right;">
        <p style="color:var(--gold);font-size:13px;font-weight:500;">${fmt(s.precio)}</p>
        ${on ? `<p style="color:var(--gold);font-size:14px;margin-top:2px;">✓</p>` : ''}
      </div>
    </div>`;
  }).join('') +
  `<button class="gold-btn" style="margin-top:8px;" onclick="if(S.bk.svcId){S.bk.step=2;render();}" ${!S.bk.svcId?'disabled':''}>Continuar →</button>`;
}

function bookStep2() {
  const days = getDays(14);
  const sd = S.bk.date;
  const slots = sd ? getSlots(sd, S.bk.svcId) : [];
  return `<p style="font-size:14px;font-weight:500;margin-bottom:12px;">Elige una fecha</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;">
  ${days.map(d => {
    const on = sd === d;
    return `<div onclick="S.bk.date='${d}';S.bk.time=null;render()" style="background:${on?'var(--gold-dim2)':'var(--bg1)'};border:${on?'1px solid var(--gold)':'0.5px solid var(--bd)'};border-radius:12px;padding:10px;cursor:pointer;text-align:center;">
      <p style="color:${on?'var(--gold)':'var(--tx2)'};font-size:10px;">${fmtDate(d).split(' ')[0]}</p>
      <p style="color:${on?'var(--gold)':'var(--tx)'};font-size:17px;font-weight:500;">${fmtDate(d).split(' ')[1]}</p>
      <p style="color:${on?'var(--gold)':'var(--tx2)'};font-size:10px;">${fmtDate(d).split(' ')[2]}</p>
    </div>`;
  }).join('')}
  </div>
  ${sd ? `<p style="font-size:14px;font-weight:500;margin-bottom:12px;">Horarios disponibles</p>
  ${slots.length === 0 ? `<p style="color:var(--tx2);font-size:13px;text-align:center;padding:20px 0;">Sin horarios disponibles este día</p>` :
  `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
  ${slots.map(t => {
    const on = S.bk.time === t;
    return `<div onclick="S.bk.time='${t}';render()" style="background:${on?'var(--gold-dim2)':'var(--bg1)'};border:${on?'1px solid var(--gold)':'0.5px solid var(--bd)'};border-radius:10px;padding:11px;cursor:pointer;text-align:center;">
      <p style="color:${on?'var(--gold)':'var(--tx)'};font-size:13px;font-weight:500;">${t}</p>
    </div>`;
  }).join('')}
  </div>`}` : `<p style="color:var(--tx2);font-size:13px;text-align:center;padding:16px 0;">Selecciona una fecha</p>`}
  <button class="gold-btn" style="margin-top:12px;" onclick="if(S.bk.date&&S.bk.time){S.bk.step=3;render();}" ${!(S.bk.date&&S.bk.time)?'disabled':''}>Continuar →</button>`;
}

function bookStep3() {
  const { svcId, date, time, pay } = S.bk;
  const svc = getSvc(svcId);
  const hasUser = S.user;
  return `
  ${!hasUser ? `
  <p style="font-size:14px;font-weight:500;margin-bottom:12px;">Tus datos</p>
  <div style="margin-bottom:10px;">
    <label style="color:var(--tx2);font-size:12px;display:block;margin-bottom:6px;">Nombre completo</label>
    <input class="inp" id="inp-nombre" type="text" placeholder="Ej: Laura Torres"/>
  </div>
  <div style="margin-bottom:18px;">
    <label style="color:var(--tx2);font-size:12px;display:block;margin-bottom:6px;">Teléfono / WhatsApp</label>
    <input class="inp" id="inp-tel" type="tel" placeholder="300 123 4567"/>
  </div>` : `
  <div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:12px;">
    <div style="width:38px;height:38px;border-radius:50%;background:var(--gold-dim);border:0.5px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;">

function adminStats() {
  const rev = S.appts.filter(a=>a.estado==='completada').reduce((s,a)=>s+(getSvc(a.servicio_id)?.precio||0),0);
  const nq = S.appts.filter(a=>a.pago==='nequi').length;
  const ef = S.appts.filter(a=>a.pago==='efectivo').length;
  const maxC = Math.max(...S.svcs.map(s=>S.appts.filter(a=>a.servicio_id==s.id&&a.estado!=='cancelada').length),1);
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">

      <span style="width:10px;height:10px;border-radius:50%;background:${c};flex-shrink:0;"></span>

      <span style="font-size:13px;font-weight:500;">${n} citas</span>
    </div>`).join('')}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin-bottom:14px;">Por servicio</p>
    ${S.svcs.map(s=>{const c=S.appts.filter(a=>a.servicio_id==s.id&&a.estado!=='cancelada').length;return`
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="color:var(--tx2);font-size:12px;">${s.nombre}</span><span style="font-size:12px;">${c}</span></div>

      </div>
    </div>`}).join('')}
  </div>`;
}

// ── ACTIONS ──
function go(screen) {
  S.screen = screen;
  if (screen === 'book') S.bk = { step:1, svcId:null, date:null, time:null, pay:null };
  if (screen === 'appointments' || screen === 'admin') loadAllAppts().then(render);
  else render();
}

function startBook(id) {
  S.bk = { step:1, svcId:id, date:null, time:null, pay:null };
  S.screen = 'book'; render();
}

function prevStep() { if (S.bk.step > 1) { S.bk.step--; render(); } }

async function confirmBook() {
  const btn = document.getElementById('btn-confirm');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  let userId = S.user?.id;
  if (!S.user) {
    const nombre = document.getElementById('inp-nombre')?.value?.trim();
    const telefono = document.getElementById('inp-tel')?.value?.trim();
    if (!nombre || !telefono) { toast('Completa tu nombre y teléfono'); if(btn){btn.disabled=false;btn.textContent='Confirmar cita ✓';} return; }
    const u = await saveUser(nombre, telefono);
    if (!u) { if(btn){btn.disabled=false;btn.textContent='Confirmar cita ✓';} return; }
    S.user = u; localStorage.setItem('kp_user', JSON.stringify(u));
    userId = u.id;
  }

  const appt = await createAppt({
    usuario_id: userId,
    servicio_id: S.bk.svcId,
    fecha: S.bk.date,
    hora: S.bk.time + ':00',
    pago: S.bk.pay,
    estado: 'pendiente',
    client_nombre: S.user.nombre
  });
  if (!appt) { if(btn){btn.disabled=false;btn.textContent='Confirmar cita ✓';} return; }
  await loadAllAppts();
  S.screen = 'bookOk'; render();
}

async function cancelAppt(id) {
  const ok = await updateAppt(id, { estado: 'cancelada' });
  if (ok) { await loadAllAppts(); render(); toast('Cita cancelada'); }
}

async function rescheduleAppt(id) {
  const a = S.appts.find(x => x.id === id); if (!a) return;
  await updateAppt(id, { estado: 'cancelada' });
  S.bk = { step:2, svcId:a.servicio_id, date:null, time:null, pay:a.pago };
  S.screen = 'book'; render(); toast('Elige nueva fecha y hora');
}

async function adminUpdate(id, estado) {
  const ok = await updateAppt(id, { estado });
  if (ok) { await loadAllAppts(); render(); toast('Cita actualizada'); }
}

async function saveSvc(id) {
  const precio = parseInt(document.getElementById('precio-'+id)?.value) || 0;
  const duracion = parseInt(document.getElementById('dur-'+id)?.value) || 0;
  const foto_url = document.getElementById('foto-'+id)?.value?.trim() || null;
  const ok = await updateSvc(id, { precio, duracion, foto_url });
  if (ok) { await loadSvcs(); render(); toast('Servicio actualizado ✓'); }
}

async function saveProfile() {
  const nombre = document.getElementById('p-nombre')?.value?.trim();
  const telefono = document.getElementById('p-tel')?.value?.trim();
  if (!nombre || !telefono) { toast('Completa todos los campos'); return; }
  const u = await saveUser(nombre, telefono);
  if (u) { S.user = u; localStorage.setItem('kp_user', JSON.stringify(u)); render(); toast('Perfil guardado ✓'); }
}

// ── RENDER ──
function render() {
  const screens = { home:renderHome, services:renderServices, book:renderBook, bookOk:renderBookOk, appointments:renderAppts, profile:renderProfile, admin:renderAdmin, adminLogin:renderAdminLogin };
  const el = document.getElementById('screen');
  el.innerHTML = (screens[S.screen] || renderHome)();
  el.scrollTop = 0;
  const navMap = { home:'home', services:'services', book:'book', bookOk:'book', appointments:'appointments', profile:'profile', admin:'profile' };
  setNav(navMap[S.screen] || 'home');
}

// ── INIT ──
async function init() {
  await Promise.all([loadSvcs(), loadAllAppts()]);
  document.getElementById('loader').style.display = 'none';
  render();
}
init();
</script>
</body>
</html>
